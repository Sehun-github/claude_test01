<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>소방기술사 모의시험</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f5f5f0;
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
      color: #1a1a1a;
      font-size: 15px;
      line-height: 1.8;
    }

    /* ── 인쇄 스타일 ── */
    @media print {
      .no-print { display: none !important; }
      body { background: white; }
      .sheet { box-shadow: none; margin: 0; }
      .answer-box textarea { border: 1px solid #999 !important; }
      .model-answer { display: none !important; }
    }

    /* ── 헤더 ── */
    .exam-header {
      background: #1a1a2e;
      color: white;
      padding: 28px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    .exam-header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .exam-header .sub {
      font-size: 0.8rem;
      color: #aaa;
      margin-top: 2px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    /* 타이머 */
    #timer {
      background: #0f3460;
      border: 1px solid #e94560;
      border-radius: 8px;
      padding: 8px 20px;
      font-size: 1.4rem;
      font-weight: 700;
      font-family: 'Courier New', monospace;
      color: #e94560;
      letter-spacing: 0.1em;
      min-width: 100px;
      text-align: center;
    }

    #timer.warning { color: #f59e0b; border-color: #f59e0b; }
    #timer.danger  { color: #ef4444; border-color: #ef4444; animation: blink 1s infinite; }

    @keyframes blink { 50% { opacity: 0.5; } }

    .btn {
      padding: 8px 18px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.15s;
    }

    .btn-primary { background: #e94560; color: white; }
    .btn-primary:hover { background: #c73652; }
    .btn-secondary { background: #2a2a45; color: #ccc; }
    .btn-secondary:hover { background: #3a3a60; color: white; }
    .btn-outline { background: transparent; color: #aaa; border: 1px solid #444; }
    .btn-outline:hover { background: #1e1e30; color: white; }

    /* ── 시험지 본문 ── */
    .sheet {
      max-width: 860px;
      margin: 32px auto;
      background: white;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      border-radius: 4px;
      overflow: hidden;
    }

    /* 시험지 상단 정보 */
    .exam-info {
      border-bottom: 3px double #1a1a2e;
      padding: 24px 48px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
    }

    .exam-info .title-block h2 {
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      color: #1a1a2e;
    }

    .exam-info .title-block .notice {
      font-size: 0.8rem;
      color: #666;
      margin-top: 6px;
    }

    .score-table {
      border-collapse: collapse;
      font-size: 0.8rem;
    }

    .score-table th, .score-table td {
      border: 1px solid #aaa;
      padding: 5px 12px;
      text-align: center;
    }

    .score-table th { background: #f0f0f0; }

    .name-row {
      display: flex;
      gap: 24px;
      padding: 12px 48px;
      border-bottom: 1px solid #ddd;
      background: #fafafa;
      font-size: 0.85rem;
      color: #444;
    }

    .name-row .field {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .name-row input {
      border: none;
      border-bottom: 1px solid #999;
      background: transparent;
      padding: 2px 8px;
      font-family: inherit;
      font-size: 0.9rem;
      width: 120px;
      outline: none;
    }

    /* ── 문제 영역 ── */
    .questions {
      padding: 32px 48px;
    }

    .section-title {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #888;
      text-transform: uppercase;
      border-bottom: 1px solid #eee;
      padding-bottom: 8px;
      margin-bottom: 24px;
    }

    .question-block {
      margin-bottom: 40px;
    }

    .q-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .q-number {
      background: #1a1a2e;
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      flex-shrink: 0;
      margin-right: 10px;
    }

    .q-text {
      flex: 1;
      font-size: 0.95rem;
      line-height: 1.9;
      color: #1a1a1a;
    }

    .q-text strong {
      color: #1a1a2e;
    }

    .q-points {
      font-size: 0.75rem;
      color: #e94560;
      font-weight: 700;
      white-space: nowrap;
      margin-left: 12px;
      background: #fff0f3;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid #fcc;
    }

    .sub-questions {
      margin: 8px 0 8px 38px;
      list-style: none;
    }

    .sub-questions li {
      font-size: 0.9rem;
      color: #333;
      padding: 2px 0;
    }

    .sub-questions li::before {
      content: attr(data-label);
      color: #1a1a2e;
      font-weight: 700;
      margin-right: 6px;
    }

    /* 답안 작성란 */
    .answer-box {
      margin-top: 12px;
    }

    .answer-box label {
      font-size: 0.75rem;
      color: #999;
      letter-spacing: 0.05em;
      display: block;
      margin-bottom: 4px;
    }

    .answer-box textarea {
      width: 100%;
      min-height: 180px;
      border: 1px solid #d0d0d0;
      border-radius: 4px;
      padding: 14px 16px;
      font-family: 'Malgun Gothic', sans-serif;
      font-size: 0.9rem;
      line-height: 1.9;
      resize: vertical;
      outline: none;
      color: #1a1a1a;
      background: #fdfdfd;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .answer-box textarea:focus {
      border-color: #1a1a2e;
      box-shadow: 0 0 0 3px rgba(26,26,46,0.08);
      background: white;
    }

    .char-count {
      text-align: right;
      font-size: 0.72rem;
      color: #bbb;
      margin-top: 3px;
    }

    /* 모범 답안 */
    .model-answer {
      display: none;
      margin-top: 12px;
      background: #f0f7ff;
      border-left: 4px solid #1a1a2e;
      border-radius: 0 6px 6px 0;
      padding: 16px 20px;
    }

    .model-answer.show { display: block; }

    .model-answer .ma-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .model-answer .ma-content {
      font-size: 0.88rem;
      line-height: 2;
      color: #1a1a2e;
      white-space: pre-line;
    }

    .model-answer .ma-content .keyword {
      background: #dbeafe;
      padding: 1px 4px;
      border-radius: 3px;
      font-weight: 600;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* 최종 점수 오버레이 */
    .score-badge {
      display: inline-block;
      font-size: 3rem;
      font-weight: 900;
      color: #e94560;
      margin: 8px 0;
    }

    /* 구분선 */
    .divider {
      border: none;
      border-top: 1px dashed #ddd;
      margin: 32px 0;
    }

    /* 하단 제출 영역 */
    .submit-area {
      background: #fafafa;
      border-top: 1px solid #eee;
      padding: 24px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .submit-area .progress {
      font-size: 0.85rem;
      color: #666;
    }

    .submit-area .progress strong {
      color: #1a1a2e;
    }

    .btn-group { display: flex; gap: 10px; }

    /* 결과 오버레이 */
    #result-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }

    #result-overlay.show { display: flex; }

    .result-box {
      background: white;
      border-radius: 12px;
      padding: 40px 48px;
      max-width: 480px;
      width: 90%;
      text-align: center;
    }

    .result-box h2 { font-size: 1.3rem; margin-bottom: 8px; color: #1a1a2e; }
    .result-box .result-time { font-size: 2.5rem; font-weight: 900; color: #e94560; margin: 16px 0; }
    .result-box p { color: #666; font-size: 0.9rem; margin-bottom: 24px; }

    /* 교시 선택 */
    .session-bar {
      display: flex;
      gap: 8px;
      padding: 12px 48px;
      background: #f0f0f0;
      border-bottom: 1px solid #ddd;
      flex-wrap: wrap;
    }

    .session-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid #ccc;
      background: white;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      color: #555;
      transition: all 0.15s;
    }

    .session-btn.active {
      background: #1a1a2e;
      color: white;
      border-color: #1a1a2e;
    }
  </style>
</head>
<body>

<!-- 상단 헤더 -->
<div class="exam-header no-print">
  <div>
    <h1>소방기술사 모의시험</h1>
    <div class="sub">Fire Protection Professional Engineer — Practice Exam</div>
  </div>
  <div class="header-right">
    <div id="timer">100:00</div>
    <button class="btn btn-secondary no-print" onclick="toggleTimer()">⏸ 일시정지</button>
    <button class="btn btn-outline no-print" onclick="window.print()">🖨 인쇄</button>
  </div>
</div>

<!-- 시험지 -->
<div class="sheet">

  <!-- 시험 정보 -->
  <div class="exam-info">
    <div class="title-block">
      <h2>소방기술사 기출 유형 모의시험</h2>
      <div class="notice">
        · 각 문항에 대해 논리적이고 체계적으로 서술하시오.<br>
        · 단위, 수식, 관련 법령 및 기준을 명시하면 가점됩니다.<br>
        · 답안 작성 후 하단 [모범답안 확인] 버튼으로 채점하세요.
      </div>
    </div>
    <table class="score-table">
      <tr><th>교시</th><th>문항수</th><th>배점</th><th>시간</th></tr>
      <tr><td>1교시</td><td>4문항</td><td>각 25점</td><td>100분</td></tr>
    </table>
  </div>

  <!-- 수험자 정보 -->
  <div class="name-row no-print">
    <div class="field">수험번호 <input type="text" placeholder=""></div>
    <div class="field">성&nbsp;&nbsp;&nbsp;&nbsp;명 <input type="text" placeholder=""></div>
    <div class="field">응시일 <input type="text" id="exam-date" placeholder=""></div>
  </div>

  <!-- 교시 선택 -->
  <div class="session-bar no-print">
    <span style="font-size:0.8rem;color:#888;line-height:28px;">문제 세트:</span>
    <button class="session-btn active" onclick="loadSet(0, this)">세트 1 — 소화설비</button>
    <button class="session-btn" onclick="loadSet(1, this)">세트 2 — 화재공학</button>
    <button class="session-btn" onclick="loadSet(2, this)">세트 3 — 제연·피난</button>
    <button class="session-btn" onclick="loadSet(3, this)">세트 4 — 위험물·전기</button>
  </div>

  <!-- 문제 영역 -->
  <div class="questions" id="questions-container">
    <!-- JS로 렌더링 -->
  </div>

  <!-- 하단 버튼 -->
  <div class="submit-area no-print">
    <div class="progress">
      작성 문항: <strong id="answered-count">0</strong> / <strong id="total-count">4</strong>
    </div>
    <div class="btn-group" style="align-items:center;">
      <button class="btn btn-secondary" onclick="toggleAnswers()">📋 모범답안 확인</button>
      <button class="btn btn-primary" onclick="submitExam()">시험 종료 및 제출</button>
    </div>
  </div>
</div>

<!-- 결과 오버레이 -->
<div id="result-overlay">
  <div class="result-box">
    <h2>시험 종료</h2>
    <div class="result-time" id="result-time">—</div>
    <p>작성한 답안을 검토하고 모범답안과 비교해 보세요.</p>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      <button class="btn btn-secondary" onclick="closeResult()">답안 검토</button>
      <button class="btn btn-primary" onclick="showAnswers()">모범답안 보기</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────
//  문제 데이터베이스
// ─────────────────────────────────────────────────
const QUESTION_SETS = [

  // ── 세트 1: 소화설비 ──────────────────────────
  [
    {
      number: 1, points: 25,
      text: `스프링클러설비의 <strong>습식·건식·준비작동식·일제살수식</strong> 4가지 방식에 대하여 다음을 설명하시오.`,
      subs: [
        { label: '(1)', text: '각 방식의 작동 원리 및 구성 요소' },
        { label: '(2)', text: '각 방식의 적용 장소 및 선정 기준' },
        { label: '(3)', text: '습식과 건식의 헤드 개방 후 방수까지의 시간 차이가 발생하는 이유와 이를 보완하기 위한 설비' },
      ],
      answer: `【1】 스프링클러설비 방식별 비교

(1) 작동 원리 및 구성 요소

① 습식(Wet Pipe)
 - 배관 내에 항상 가압수가 충전된 상태 유지
 - 헤드 감열부 용해 → 즉시 방수
 - 구성: 알람밸브(습식 유수검지장치), 가압송수장치, 헤드

② 건식(Dry Pipe)
 - 배관 내 압축공기(또는 질소) 충전
 - 헤드 개방 → 공기 배출 → 드라이밸브 개방 → 방수
 - 구성: 드라이밸브, 공기압축기, 가속기(Accelerator/Exhauster)
 - 방수 지연: 헤드 개방 후 60초 이내 방수 기준(NFPA)

③ 준비작동식(Pre-Action)
 - 배관 내 저압 공기 또는 대기압 상태
 - 감지기 작동 → 준비작동밸브 개방 → 헤드 개방 시 방수
 - 2중 안전장치(감지기 + 헤드) → 오방수 방지
 - 구성: 준비작동식 유수검지장치, 화재감지기(교차회로)

④ 일제살수식(Deluge)
 - 개방형 헤드 사용, 배관 내 물 없음
 - 감지기 작동 → 델류지밸브 개방 → 전 헤드 일제 방수
 - 구성: 델류지밸브, 개방형 헤드, 화재감지기

(2) 적용 장소 및 선정 기준

 · 습식: 동결 우려 없는 일반 장소 (사무실, 백화점 등) — 가장 신뢰성 높고 경제적
 · 건식: 동결 위험 장소 (주차장 옥외, 냉동창고 인근) — 충전 공기가 단열막 역할
 · 준비작동식: 전산실, 박물관 등 수손(水損) 피해 우려 장소 — 오방수 방지 최우선
 · 일제살수식: 화재 급속 확산 우려 장소 (항공기 격납고, 무대부, 위험물 저장소)

(3) 건식과 습식의 방수 시간 차이 원인 및 보완

▶ 원인
 · 건식은 헤드 개방 후 배관 내 충전 공기가 완전히 배출될 때까지 물이 도달하지 못함
 · 배관 용적이 클수록, 배관 길이가 길수록 지연 시간 증가

▶ 보완 설비
 · 가속기(Accelerator): 드라이밸브 중간체임버로 공기를 신속 유도, 밸브 조기 개방
 · 배기장치(Exhauster): 배관 내 공기를 강제 배출하여 방수 시간 단축
 · Quick-Opening Device(QOD): 가속기와 배기장치의 총칭
 → NFPA 13 기준: 가장 먼 헤드까지 방수 시간 60초 이내`
    },
    {
      number: 2, points: 25,
      text: `포소화설비(Foam Extinguishing System)에 대하여 다음을 설명하시오.`,
      subs: [
        { label: '(1)', text: '포의 소화 원리 3가지 (질식, 냉각, 유화)를 설명하시오.' },
        { label: '(2)', text: '포 혼합방식(프로포셔너 방식) 4가지의 원리와 특징을 비교하시오.' },
        { label: '(3)', text: '고발포와 저발포의 팽창비 기준 및 적용 장소를 설명하시오.' },
      ],
      answer: `【2】 포소화설비

(1) 포의 소화 원리

① 질식 효과 (주된 소화 원리)
 · 포 층이 연소면을 덮어 공기(산소) 공급 차단
 · 팽창비가 높을수록 두꺼운 포 층 형성 → 질식 효과 증대

② 냉각 효과
 · 포에 함유된 수분이 증발하면서 열 흡수
 · 수성막포(AFFF)의 경우 얇은 수막층 형성으로 냉각 효과 보완

③ 유화 효과 (에멀션화)
 · 포제가 가연성 액체 표면에 유화층 형성
 · 가연성 증기 발생 억제 — 특히 알코올형 포에서 중요
 · 수용성 위험물(알코올, 케톤류)에는 내알코올포 사용 필요

(2) 포 혼합방식 4가지 비교

① 라인 프로포셔너(Line Proportioner / 관로혼합방식)
 · 벤투리 효과를 이용, 포 원액을 흡입·혼합
 · 구조 간단, 설치비 저렴 / 압력손실 크고 혼합비율 불안정

(1) FTA (Fault Tree Analysis, 결함수 분석법)

▶ 개념: 특정 사고(Top Event)로부터 원인을 논리 게이트로 역추적하는 연역적 Top-Down 분석법

▶ 주요 기호
 · AND 게이트 (∩): 모든 하위 사건 동시 발생 시 상위 사건 발생
 · OR 게이트 (∪): 하위 사건 중 하나만 발생해도 상위 사건 발생
 · 기본사상(Basic Event): 최하위 원인 (더 이상 분해 불가)

▶ 절차
 1. Top Event 정의 2. 중간 사상 도출 및 논리 게이트 연결
 3. 최소 컷셋(Minimal Cut Set) 산출
 4. 정성적·정량적 위험도 평가 5. 개선 대책 도출

 2. 고장 모드 식별

 4. RPN 높은 순서로 개선 우선순위 결정

 · 간접뢰(Indirect Stroke): 근처 낙뢰 → 전자기 유도 → 전기·통신 기기 파손

// ─────────────────────────────────────────────────
//  타이머
// ─────────────────────────────────────────────────
const EXAM_MINUTES = 100;
let totalSeconds = EXAM_MINUTES * 60;
let timerInterval = null;
let timerPaused  = false;
let examStarted  = false;
// 세트별 남은 시간 저장 (세트 수만큼)
const setTimers = Array(4).fill(null).map(() => EXAM_MINUTES * 60);

function startTimer() {
  examStarted = true;
  timerInterval = setInterval(() => {
    if (timerPaused) return;
    totalSeconds--;
    if (totalSeconds <= 0) {
      clearInterval(timerInterval);
      submitExam(true);
      return;
    }
    updateTimerDisplay();
  }, 1000);
}

function updateTimerDisplay() {
  const m = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
  const s = String(totalSeconds % 60).padStart(2, '0');
  const el = document.getElementById('timer');
  el.textContent = `${m}:${s}`;
  if (totalSeconds <= 600) el.className = 'danger';
  else if (totalSeconds <= 1800) el.className = 'warning';
  else el.className = '';
}

function toggleTimer() {
  timerPaused = !timerPaused;
  document.querySelector('[onclick="toggleTimer()"]').textContent =
    timerPaused ? '▶ 재개' : '⏸ 일시정지';
}

// ─────────────────────────────────────────────────
//  문제 렌더링
// ─────────────────────────────────────────────────
let currentSet = 0;
let answersShown = false;
const QUESTIONS_PER_EXAM = 4; // 세트당 출제 문항 수

function pickRandom(arr, n) {
  const shuffled = [...arr].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, n);
}

// 세트별 랜덤 뽑힌 문제 저장 (세트 전환 후 돌아와도 동일 문제 유지)
const pickedQuestions = QUESTION_SETS.map(set => pickRandom(set, QUESTIONS_PER_EXAM));

function loadSet(index, btn) {
  // 현재 세트 타이머 저장
  setTimers[currentSet] = totalSeconds;
  currentSet = index;
  answersShown = false;
  // 버튼 활성화
  document.querySelectorAll('.session-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // 해당 세트의 남은 시간 복원 (처음이면 100분)
  totalSeconds = setTimers[index];
  updateTimerDisplay();
  // 렌더링 (랜덤 뽑힌 문제 사용)
  renderQuestions(pickedQuestions[index]);
  updateProgress();
}

function renderQuestions(questions) {
  const container = document.getElementById('questions-container');
  container.innerHTML = `<div class="section-title">문제 (각 25점)</div>`;

  questions.forEach((q, i) => {
    const block = document.createElement('div');
    block.className = 'question-block';
    block.id = `q-block-${i}`;

    let subsHtml = '';
    if (q.subs && q.subs.length) {
      subsHtml = `<ul class="sub-questions">` +
        q.subs.map(s => `<li data-label="${s.label}">${s.text}</li>`).join('') +
        `</ul>`;
    }

    block.innerHTML = `
      <div class="q-header">
        <div style="display:flex;align-items:flex-start;flex:1;">
          <span class="q-number">${q.number}</span>
          <div class="q-text">${q.text}${subsHtml}</div>
        </div>
        <span class="q-points">${q.points}점</span>
      </div>
      <div class="answer-box">
        <label>▷ 답안 작성란</label>
        <textarea id="ans-${i}" placeholder="여기에 답안을 작성하세요." oninput="onAnswerInput(${i})"></textarea>
        <div class="char-count" id="char-${i}">0자</div>
      </div>
      <div class="model-answer" id="ma-${i}">
        <div class="ma-title">【 모범 답안 】</div>
        <div class="ma-content">${q.answer}</div>
      </div>
      ${i < questions.length - 1 ? '<hr class="divider">' : ''}
    `;
    container.appendChild(block);
  });

  document.getElementById('total-count').textContent = questions.length;

  // 타이머 시작 (항상 기존 인터벌 제거 후 새로 시작)
  clearInterval(timerInterval);
  examStarted = false;
  startTimer();
}

function onAnswerInput(idx) {
  const ta = document.getElementById(`ans-${idx}`);
  document.getElementById(`char-${idx}`).textContent = ta.value.length + '자';
  updateProgress();
}

function updateProgress() {
  const total = QUESTION_SETS[currentSet].length;
  let count = 0;
  for (let i = 0; i < total; i++) {
    const ta = document.getElementById(`ans-${i}`);
    if (ta && ta.value.trim().length > 10) count++;
  }
  document.getElementById('answered-count').textContent = count;
}

// ─────────────────────────────────────────────────
//  모범 답안 토글
// ─────────────────────────────────────────────────
function toggleAnswers() {
  answersShown = !answersShown;
  const total = QUESTION_SETS[currentSet].length;
  for (let i = 0; i < total; i++) {
    const el = document.getElementById(`ma-${i}`);
    if (el) el.classList.toggle('show', answersShown);
  }
}

function showAnswers() {
  closeResult();
  answersShown = true;
  const total = QUESTION_SETS[currentSet].length;
  for (let i = 0; i < total; i++) {
    const el = document.getElementById(`ma-${i}`);
    if (el) el.classList.add('show');
  }
  setTimeout(() => {
    document.getElementById('q-block-0')?.scrollIntoView({ behavior: 'smooth' });
  }, 100);
}

// ─────────────────────────────────────────────────
//  시험 제출
// ─────────────────────────────────────────────────
function submitExam(autoSubmit = false) {
  clearInterval(timerInterval);
  const elapsed = EXAM_MINUTES * 60 - totalSeconds;
  const m = Math.floor(elapsed / 60);
  const s = elapsed % 60;
  document.getElementById('result-time').textContent = `${m}분 ${s}초`;
  document.getElementById('result-overlay').classList.add('show');
}

function closeResult() {
  document.getElementById('result-overlay').classList.remove('show');
}

// ─────────────────────────────────────────────────
//  초기화
// ─────────────────────────────────────────────────
document.getElementById('exam-date').value =
  new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric' });
renderQuestions(pickedQuestions[0]);
</script>
</body>
