<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude 대화 뷰어</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d14;
      color: #e0e0e0;
      font-family: 'Segoe UI', -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #12121f;
      border-bottom: 1px solid #1e1e30;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    header h1 { font-size: 1rem; font-weight: 600; color: #c0c0d0; letter-spacing: 0.05em; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #6366f1; display: inline-block; flex-shrink: 0; }

    .load-btn {
      margin-left: auto;
      padding: 6px 16px;
      background: #1e1e3a;
      border: 1px solid #3a3a60;
      border-radius: 8px;
      color: #9090c0;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .load-btn:hover { background: #2a2a50; color: #c0c0e0; }

    .layout { display: flex; flex: 1; overflow: hidden; }

    /* 사이드바 */
    .sidebar {
      width: 300px;
      flex-shrink: 0;
      background: #0f0f1c;
      border-right: 1px solid #1e1e30;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 12px 16px;
      font-size: 0.7rem;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-bottom: 1px solid #1a1a28;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .session-count-badge { color: #3a3a5a; }

    /* 검색창 */
    .search-box {
      padding: 10px 12px;
      border-bottom: 1px solid #1a1a28;
      flex-shrink: 0;
    }
    .search-box input {
      width: 100%;
      background: #0d0d1a;
      border: 1px solid #2a2a40;
      border-radius: 8px;
      padding: 7px 32px 7px 10px;
      color: #c0c0d0;
      font-size: 0.8rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-box input:focus { border-color: #4a4a70; }
    .search-box input::placeholder { color: #333; }
    .search-wrap { position: relative; }
    .search-wrap .clear-btn {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: #3a3a5a; cursor: pointer;
      font-size: 0.75rem; display: none; line-height: 1;
    }
    .search-wrap .clear-btn.show { display: block; }
    .search-match { color: #ffd43b !important; font-weight: 700; }

    .session-list { overflow-y: auto; flex: 1; }
    .session-list::-webkit-scrollbar { width: 4px; }
    .session-list::-webkit-scrollbar-thumb { background: #2a2a40; border-radius: 4px; }

    .session-item {
      padding: 12px 16px;
      border-bottom: 1px solid #1a1a28;
      cursor: pointer;
      transition: background 0.15s;
    }
    .session-item:hover { background: #16162a; }
    .session-item.active { background: #1e1e3a; border-left: 3px solid #6366f1; padding-left: 13px; }
    .session-slug { font-size: 0.8rem; font-weight: 600; color: #a0a0c0; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .session-preview { font-size: 0.72rem; color: #444; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
    .session-meta { font-size: 0.65rem; color: #333; display: flex; gap: 8px; }

    /* 온보딩 */
    .onboarding {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      color: #2a2a40;
      padding: 32px;
      text-align: center;
    }
    .onboarding .icon { font-size: 2.5rem; }
    .onboarding p { font-size: 0.8rem; line-height: 1.7; }
    .onboarding code {
      background: #1a1a2e;
      border: 1px solid #2a2a45;
      border-radius: 4px;
      padding: 2px 7px;
      font-family: 'Consolas', monospace;
      font-size: 0.75rem;
      color: #5a5a80;
    }
    .onboarding .open-btn {
      padding: 10px 24px;
      background: #1e1e3a;
      border: 1px solid #3a3a60;
      border-radius: 10px;
      color: #8080c0;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .onboarding .open-btn:hover { background: #2a2a50; color: #c0c0e0; }

    /* 메인 */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .chat-header {
      padding: 12px 24px;
      border-bottom: 1px solid #1e1e30;
      background: #0f0f1c;
      flex-shrink: 0;
      display: none;
    }
    .chat-title { font-size: 0.9rem; font-weight: 600; color: #9090b0; margin-bottom: 2px; }
    .chat-meta { font-size: 0.72rem; color: #333; }

    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .chat-body::-webkit-scrollbar { width: 6px; }
    .chat-body::-webkit-scrollbar-thumb { background: #2a2a40; border-radius: 4px; }

    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: #2a2a40;
    }
    .empty-state .icon { font-size: 2.5rem; }
    .empty-state p { font-size: 0.8rem; }

    /* 메시지 */
    .msg { display: flex; gap: 12px; max-width: 860px; width: 100%; }
    .msg.user { flex-direction: row-reverse; align-self: flex-end; }

    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 700;
      flex-shrink: 0; margin-top: 2px;
    }
    .msg.user .avatar { background: #6366f1; color: white; }
    .msg.assistant .avatar { background: #1e2a3a; color: #74c0fc; border: 1px solid #2a3a50; }

    .bubble-wrap { display: flex; flex-direction: column; max-width: calc(100% - 44px); }
    .msg.user .bubble-wrap { align-items: flex-end; }

    .bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.84rem;
      line-height: 1.65;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .msg.user .bubble { background: #1e1e3a; border: 1px solid #2a2a50; color: #c8c8e8; border-top-right-radius: 4px; }
    .msg.assistant .bubble { background: #12121f; border: 1px solid #1e1e30; color: #d0d0e0; border-top-left-radius: 4px; }

    .msg-time { font-size: 0.62rem; color: #2a2a40; margin-top: 4px; }

    .bubble code {
      background: #1a1a2e; border: 1px solid #2a2a45; border-radius: 4px;
      padding: 1px 5px; font-family: 'Consolas', monospace; font-size: 0.78rem; color: #74c0fc;
    }
    .bubble pre {
      background: #0d0d1a; border: 1px solid #1e1e35; border-radius: 8px;
      padding: 12px; overflow-x: auto; margin: 8px 0;
    }
    .bubble pre code { background: none; border: none; padding: 0; color: #c8d3f5; }
  </style>
</head>
<body>

<header>
  <span class="dot"></span>
  <h1>Claude 대화 뷰어</h1>
  <button class="load-btn" onclick="openFolder()">📂 폴더 열기</button>
</header>

<!-- 숨겨진 파일 입력 -->
<input type="file" id="folderInput" webkitdirectory multiple accept=".jsonl" style="display:none" onchange="handleFiles(this.files)">

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <span>대화 세션</span>
      <span class="session-count-badge" id="countBadge"></span>
    </div>
    <div class="search-box" id="searchBox" style="display:none">
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="세션 검색..." oninput="onSearch(this.value)">
        <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
      </div>
    </div>
    <div class="session-list" id="sessionList">
      <div class="onboarding">
        <div class="icon">📁</div>
        <p>우측 상단 <strong style="color:#6060a0">폴더 열기</strong>를 클릭하고<br>아래 경로를 선택하세요</p>
        <code>%USERPROFILE%\.claude\projects\<br>C--Users-student-Documents-claude-test</code>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="chat-header" id="chatHeader">
      <div class="chat-title" id="chatTitle"></div>
      <div class="chat-meta" id="chatMeta"></div>
    </div>
    <div class="chat-body" id="chatBody">
      <div class="empty-state">
        <div class="icon">💬</div>
        <p>왼쪽에서 세션을 선택하세요</p>
      </div>
    </div>
  </main>
</div>

<script>
let sessions = [];
let currentQuery = '';
let currentSessionIdx = null;

function openFolder() {
  document.getElementById('folderInput').click();
}

async function handleFiles(fileList) {
  const jsonlFiles = Array.from(fileList).filter(f => f.name.endsWith('.jsonl'));
  if (!jsonlFiles.length) {
    alert('.jsonl 파일이 없습니다. 올바른 폴더를 선택했는지 확인하세요.');
    return;
  }

  sessions = [];
  for (const file of jsonlFiles) {
    try {
      const text = await file.text();
      const parsed = parseSession(file.name.replace('.jsonl',''), text);
      if (parsed.messages.length > 0) sessions.push(parsed);
    } catch { /* skip */ }
  }

  sessions.sort((a, b) => b.firstTs.localeCompare(a.firstTs));
  document.getElementById('searchBox').style.display = 'block';
  renderSessionList();
}

function parseSession(id, raw) {
  const lines = raw.split('\n').filter(Boolean);
  const messages = [];
  let slug = '', firstTs = '', cwd = '';

  for (const line of lines) {
    let obj;
    try { obj = JSON.parse(line); } catch { continue; }

    if (!slug && obj.slug) slug = obj.slug;
    if (!cwd && obj.cwd) cwd = obj.cwd;

    if (obj.type === 'user' && obj.message?.role === 'user') {
      if (obj.isMeta) continue;
      const content = obj.message.content;
      if (Array.isArray(content) && content.some(b => b.type === 'tool_result')) continue;
      const text = extractText(content).trim();
      if (!text || text.startsWith('<command')) continue;
      if (!firstTs) firstTs = obj.timestamp || '';
      messages.push({ role: 'user', text, timestamp: obj.timestamp || '' });
    } else if (obj.type === 'assistant' && obj.message?.role === 'assistant') {
      const text = extractText(obj.message.content).trim();
      if (text) messages.push({ role: 'assistant', text, timestamp: obj.timestamp || '' });
    }
  }

  return { id, slug: slug || id.slice(0, 8), firstTs, cwd, messages };
}

function extractText(content) {
  if (typeof content === 'string') return content;
  if (Array.isArray(content)) return content.filter(b => b.type === 'text').map(b => b.text).join('');
  return '';
}

function renderSessionList(query = '') {
  const q = query.trim().toLowerCase();
  const filtered = q
    ? sessions.map((s, i) => ({ s, i })).filter(({ s }) =>
        s.slug.toLowerCase().includes(q) ||
        s.messages.some(m => m.text.toLowerCase().includes(q)))
    : sessions.map((s, i) => ({ s, i }));

  document.getElementById('countBadge').textContent =
    q ? `${filtered.length} / ${sessions.length}개` : `${sessions.length}개`;

  const el = document.getElementById('sessionList');
  if (!filtered.length) {
    el.innerHTML = `<div class="onboarding"><p>"${esc(query)}" 검색 결과 없음</p></div>`;
    return;
  }
  el.innerHTML = filtered.map(({ s, i }) => {
    const slugHtml = q ? highlight(s.slug, q) : esc(s.slug);
    const preview = s.messages[0]?.text?.slice(0, 100) || '';
    const previewHtml = q ? highlight(preview, q) : esc(preview);
    return `
      <div class="session-item${currentSessionIdx === i ? ' active' : ''}" onclick="selectSession(${i}, this)">
        <div class="session-slug">${slugHtml}</div>
        <div class="session-preview">${previewHtml}</div>
        <div class="session-meta">
          <span>${fmtDate(s.firstTs)}</span>
          <span>💬 ${s.messages.length}</span>
        </div>
      </div>`;
  }).join('');
}

function onSearch(value) {
  currentQuery = value;
  document.getElementById('clearBtn').classList.toggle('show', value.length > 0);
  renderSessionList(value);
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  onSearch('');
}

function selectSession(idx, el) {
  currentSessionIdx = idx;
  document.querySelectorAll('.session-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  renderChat(sessions[idx], currentQuery);
}

function renderChat(s, query = '') {
  const header = document.getElementById('chatHeader');
  header.style.display = 'block';
  document.getElementById('chatTitle').textContent = s.slug;
  const q = query.trim().toLowerCase();
  const matchCount = q ? s.messages.filter(m => m.text.toLowerCase().includes(q)).length : 0;
  document.getElementById('chatMeta').textContent =
    `${fmtDate(s.firstTs)}  ·  메시지 ${s.messages.length}개  ·  ${s.cwd || ''}` +
    (matchCount ? `  ·  🔍 ${matchCount}개 메시지 일치` : '');

  const body = document.getElementById('chatBody');
  body.innerHTML = s.messages.map(m => `
    <div class="msg ${m.role}">
      <div class="avatar">${m.role === 'user' ? 'U' : 'AI'}</div>
      <div class="bubble-wrap">
        <div class="bubble">${renderMd(m.text, q)}</div>
        <div class="msg-time">${fmtTime(m.timestamp)}</div>
      </div>
    </div>
  `).join('');

  // 첫 번째 하이라이트로 스크롤
  const firstMatch = body.querySelector('.search-match');
  if (firstMatch) firstMatch.scrollIntoView({ block: 'center' });
  else body.scrollTop = body.scrollHeight;
}

function renderMd(text, query = '') {
  let h = esc(text);
  h = h.replace(/```[\w]*\n([\s\S]*?)```/g, (_, c) => `<pre><code>${c.trimEnd()}</code></pre>`);
  h = h.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  if (query) h = highlightHtml(h, query);
  return h;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 일반 텍스트 하이라이트 (세션 목록용)
function highlight(text, query) {
  const escaped = esc(text);
  const re = new RegExp(`(${escRe(query)})`, 'gi');
  return escaped.replace(re, '<span class="search-match">$1</span>');
}

// HTML 내 텍스트 노드만 하이라이트 (태그 속성·코드 건드리지 않음)
function highlightHtml(html, query) {
  const re = new RegExp(`(${escRe(esc(query))})`, 'gi');
  // 태그 밖의 텍스트에만 적용
  return html.replace(/(<[^>]+>)|([^<]+)/g, (m, tag, text) => {
    if (tag) return tag;
    return text.replace(re, '<span class="search-match">$1</span>');
  });
}

function escRe(s) {
  return String(s).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}
function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())}`;
}
function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return `${fmtDate(ts)} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function pad(n) { return String(n).padStart(2,'0'); }
</script>
</body>
</html>
