<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude 챗봇</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

    :root {
      --primary: #1a3a5c;
      --accent: #2d7dd2;
      --accent-light: #e8f1fb;
      --bg: #f5f7fa;
      --white: #ffffff;
      --border: #dde3ea;
      --text: #2c2c2c;
      --muted: #6b7280;
      --user-bg: #2d7dd2;
      --ai-bg: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .chat-container {
      width: 100%;
      max-width: 800px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--white);
      box-shadow: 0 0 40px rgba(0,0,0,0.1);
    }

    /* 헤더 */
    .chat-header {
      background: var(--primary);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .header-icon {
      width: 40px; height: 40px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header-info h1 { color: #fff; font-size: 16px; font-weight: 700; }
    .header-info p { color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 1px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #4ade80;
      margin-left: auto;
      box-shadow: 0 0 6px #4ade80;
    }

    /* 메시지 영역 */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 85%;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.assistant { align-self: flex-start; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .message.user .avatar { background: var(--accent); color: #fff; font-weight: 700; }
    .message.assistant .avatar { background: var(--accent-light); font-size: 18px; }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14.5px;
      line-height: 1.7;
    }
    .message.user .bubble {
      background: var(--user-bg);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.assistant .bubble {
      background: var(--ai-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    /* 타이핑 인디케이터 */
    .typing .bubble { padding: 14px 18px; }
    .typing-dots { display: flex; gap: 4px; align-items: center; }
    .typing-dots span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: dot-bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot-bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    /* 환영 메시지 */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    .welcome .icon { font-size: 48px; margin-bottom: 12px; }
    .welcome h2 { font-size: 18px; color: var(--primary); margin-bottom: 8px; }
    .welcome p { font-size: 13.5px; line-height: 1.7; }

    /* 입력 영역 */
    .input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--white);
      flex-shrink: 0;
    }
    .input-wrap {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }
    .input-wrap:focus-within { border-color: var(--accent); }

    textarea {
      flex: 1;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 14.5px;
      color: var(--text);
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.6;
    }
    textarea::placeholder { color: var(--muted); }

    .send-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: var(--primary); }
    .send-btn:disabled { background: var(--border); cursor: default; }

    .input-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
    }
    .input-hint { font-size: 11.5px; color: var(--muted); }
    .clear-btn {
      background: none; border: none;
      font-size: 11.5px; color: var(--muted);
      cursor: pointer; font-family: inherit;
    }
    .clear-btn:hover { color: var(--primary); }

    /* 코드 블록 */
    .bubble pre {
      background: #1e293b;
      color: #e2e8f0;
      padding: 12px 14px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 13px;
      margin: 8px 0;
      line-height: 1.6;
    }
    .bubble code { font-family: 'Courier New', monospace; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
  </style>
</head>
<body>

<div class="chat-container">
  <!-- 헤더 -->
  <div class="chat-header">
    <div class="header-icon">🤖</div>
    <div class="header-info">
      <h1>Claude 챗봇</h1>
      <p>claude-opus-4-6 · 한국어 지원</p>
    </div>
    <div class="status-dot"></div>
  </div>

  <!-- 메시지 목록 -->
  <div class="messages" id="messages">
    <div class="welcome">
      <div class="icon">💬</div>
      <h2>안녕하세요!</h2>
      <p>무엇이든 물어보세요.<br>아래 입력창에 메시지를 입력하고 전송하면 됩니다.</p>
    </div>
  </div>

  <!-- 입력 영역 -->
  <div class="input-area">
    <div class="input-wrap">
      <textarea
        id="input"
        placeholder="메시지를 입력하세요..."
        rows="1"
      ></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        ➤
      </button>
    </div>
    <div class="input-footer">
      <span class="input-hint">Enter로 전송 · Shift+Enter로 줄바꿈</span>
      <button class="clear-btn" onclick="clearMessages()">대화 초기화</button>
    </div>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send-btn');

  // 대화 히스토리 (서버로 전송되는 실제 메시지 배열)
  let history = [];

  // textarea 자동 높이 조절
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  // Enter 전송 / Shift+Enter 줄바꿈
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addMessage(role, text) {
    // 환영 메시지 제거
    const welcome = messagesEl.querySelector('.welcome');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = `message ${role}`;

    const avatarText = role === 'user' ? '나' : '🤖';
    div.innerHTML = `
      <div class="avatar">${avatarText}</div>
      <div class="bubble">${formatText(text)}</div>
    `;
    messagesEl.appendChild(div);
    scrollToBottom();
    return div;
  }

  function addTypingIndicator() {
    const div = document.createElement('div');
    div.className = 'message assistant typing';
    div.id = 'typing';
    div.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble">
        <div class="typing-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    `;
    messagesEl.appendChild(div);
    scrollToBottom();
    return div;
  }

  // 마크다운 코드블록 간단 처리
  function formatText(text) {
    return text
      .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\n/g, '<br>');
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;

    // 입력 초기화
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    // 사용자 메시지 표시
    addMessage('user', text);

    // 히스토리에 추가
    history.push({ role: 'user', content: text });

    // 타이핑 인디케이터
    const typingEl = addTypingIndicator();

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });

      // SSE 스트리밍 처리
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let aiText = '';

      // 타이핑 인디케이터 → 실제 AI 버블로 교체
      typingEl.remove();
      const aiMsg = addMessage('assistant', '');
      const bubble = aiMsg.querySelector('.bubble');

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value);
        const lines = chunk.split('\n');

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6);
          if (data === '[DONE]') break;

          try {
            const parsed = JSON.parse(data);
            if (parsed.text) {
              aiText += parsed.text;
              bubble.innerHTML = formatText(aiText);
              scrollToBottom();
            }
            if (parsed.error) {
              bubble.innerHTML = `<span style="color:#ef4444">오류: ${parsed.error}</span>`;
            }
          } catch {}
        }
      }

      // 히스토리에 AI 응답 추가
      history.push({ role: 'assistant', content: aiText });

    } catch (err) {
      typingEl.remove();
      addMessage('assistant', '⚠️ 서버 연결 오류. 서버가 실행 중인지 확인해 주세요.');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  function clearMessages() {
    history = [];
    messagesEl.innerHTML = `
      <div class="welcome">
        <div class="icon">💬</div>
        <h2>대화가 초기화되었습니다.</h2>
        <p>새로운 대화를 시작해 보세요!</p>
      </div>
    `;
  }
</script>
</body>
</html>
